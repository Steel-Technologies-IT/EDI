name: Deploy DEV
on:
  push:
    branches:
      - 'Dev' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: "Invex Apps Dev"
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2
     

      # 2. Install backend dependencies
      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: ./backend
        shell: cmd

      # 3. Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
        shell: cmd

      # 4. Build frontend for production
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        shell: cmd

      # 5. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          try {
            npx pm2 kill
          } catch {
            Write-Host "No PM2 processes to stop"
          }
        shell: powershell
        continue-on-error: true

      # 6. Start with PM2
      - name: Launch with PM2
        run: |
          $env:RUNNER_TRACKING_ID=""
          $env:PM2_FORCE_WIN32="1"
          $env:PIDUSAGE_USE_PS="1"
          npx pm2 start ecosystem.config.cjs --update-env
          npx pm2 save
        shell: powershell

      # 7. Verify deployment
      - name: Check PM2 status
        run: |
          npx pm2 status
          npx pm2 logs --lines 10 --nostream
        shell: powershell