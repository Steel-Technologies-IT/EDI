name: Deploy Dev

on:
  push:
    branches:
      - 'FrontEnd_TranlationRules' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: "Invex Apps Dev"
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_QA }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID_QA }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET_QA }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB_QA }}
      REACT_APP_Entra_Authority: ${{ secrets.REACT_APP_ENTRA_AUTHORITY }}
      REACT_APP_Entra_ClientId: ${{ secrets.REACT_APP_ENTRA_CLIENTIDDEV }}
      REACT_APP_HOST: ${{ secrets.REACT_APP_HOST }}
      REACT_APP_ADMIN_GROUP: ${{ secrets.REACT_APP_ADMIN_GROUP }}
      REACT_APP_REDIRECT_URI: ${{ secrets.REACT_APP_REDIRECT_URI_DEV }}
      

    steps:
      - name: Setup Git
        run: |
          if (!(Get-Command git -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Git..."
            winget install --id Git.Git -e --source winget --silent --accept-source-agreements --accept-package-agreements
            $env:PATH += ";C:\Program Files\Git\bin"
          }
          git --version
        shell: powershell
        
      - uses: actions/checkout@v4.2.2

      # Check what changed
      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            frontend:
              - 'frontend/src/**'
              - 'frontend/public/**'
              - 'frontend/package*.json'
            backend:
              - 'backend/**'
              - '!backend/node_modules/**'

      # Cache dependencies
      - name: Cache backend node modules
        if: steps.changes.outputs.backend == 'true'
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Cache frontend node modules
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Cache frontend build
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/cache@v3
        with:
          path: frontend/build
          key: ${{ runner.os }}-frontend-build-${{ hashFiles('frontend/src/**/*', 'frontend/public/**/*') }}
          restore-keys: |
            ${{ runner.os }}-frontend-build-

      # Install dependencies (only if changed)
      - name: Install backend dependencies
        if: steps.changes.outputs.backend == 'true'
        run: |
          if (!(Test-Path "node_modules")) {
            npm ci --only=production --silent
          } else {
            Write-Host "Backend dependencies already cached"
          }
        working-directory: ./backend
        shell: powershell

      - name: Install frontend dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if (!(Test-Path "node_modules")) {
            npm ci --silent
          } else {
            Write-Host "Frontend dependencies already cached"
          }
        working-directory: ./frontend
        shell: powershell

      # Build frontend (only if changed)
      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true'
        run: |
          if (!(Test-Path "build") -or ((Get-ChildItem build -Recurse | Measure-Object).Count -eq 0)) {
            npm run build
          } else {
            Write-Host "Frontend build already cached"
          }
        working-directory: ./frontend
        shell: powershell

      # Smart PM2 restart
      - name: Smart PM2 restart
        run: |
          try {
            $processes = npx pm2 jlist | ConvertFrom-Json -ErrorAction Stop
            
            if ($processes -and $processes.Count -gt 0) {
              Write-Host "Reloading existing PM2 processes..."
              npx pm2 reload ecosystem.config.cjs --update-env
            } else {
              throw "No processes running"
            }
          } catch {
            Write-Host "Starting fresh PM2 processes..."
            npx pm2 kill 2>$null
            Start-Sleep -Seconds 1
            npx pm2 start ecosystem.config.cjs --update-env
          }
          
          npx pm2 save
        shell: powershell

      # Quick verification
      - name: Quick status check
        run: npx pm2 status
        shell: powershell

