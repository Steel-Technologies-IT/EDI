name: Deploy Dev

on:
  push:
    branches:
      - 'FrontEnd_TranlationRules' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: "Invex Apps Dev"
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_QA }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID_QA }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET_QA }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB_QA }}
      REACT_APP_Entra_Authority: ${{ secrets.REACT_APP_ENTRA_AUTHORITY }}
      REACT_APP_Entra_ClientId: ${{ secrets.REACT_APP_ENTRA_CLIENTIDDEV }}
      REACT_APP_HOST: ${{ secrets.REACT_APP_HOST }}
      REACT_APP_ADMIN_GROUP: ${{ secrets.REACT_APP_ADMIN_GROUP }}
      REACT_APP_REDIRECT_URI: ${{ secrets.REACT_APP_REDIRECT_URI_DEV }}
      

    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2
      
      # 2. Install backend dependencies
      - name: Install backend dependencies
        run: npm ci --only=production
        working-directory: ./backend
        shell: cmd

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
        shell: cmd

      # 4. Build frontend for production
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        shell: cmd

      # 5. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          try {
            # Force kill any existing PM2 processes and clean up
            npx pm2 kill
            Start-Sleep -Seconds 2
          } catch {
            Write-Host "No PM2 processes to stop"
          }
          # Clean up any leftover PM2 files
          try {
            Remove-Item -Path "$env:USERPROFILE\.pm2\rpc.sock" -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$env:USERPROFILE\.pm2\pub.sock" -Force -ErrorAction SilentlyContinue
          } catch {
            Write-Host "PM2 socket cleanup completed"
          }
        shell: powershell
        continue-on-error: true

      # Smart PM2 restart
      - name: Smart PM2 restart
        run: |
          try {
            $processes = npx pm2 jlist | ConvertFrom-Json -ErrorAction Stop
            
            if ($processes -and $processes.Count -gt 0) {
              Write-Host "Reloading existing PM2 processes..."
              npx pm2 reload ecosystem.config.cjs --update-env
            } else {
              throw "No processes running"
            }
          } catch {
            Write-Host "Starting fresh PM2 processes..."
            npx pm2 kill 2>$null
            Start-Sleep -Seconds 1
            npx pm2 start ecosystem.config.cjs --update-env
          }
          
          npx pm2 save
        shell: powershell

      # Quick verification
      - name: Quick status check
        run: npx pm2 status
        shell: powershell


