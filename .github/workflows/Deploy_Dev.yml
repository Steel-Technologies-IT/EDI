name: Deploy Dev

on:
  push:
    branches:
      - 'FrontEnd_TranlationRules' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: "Invex Apps Dev"
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_QA }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID_QA }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET_QA }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB_QA }}
      REACT_APP_Entra_Authority: ${{ secrets.REACT_APP_ENTRA_AUTHORITY }}
      REACT_APP_Entra_ClientId: ${{ secrets.REACT_APP_ENTRA_CLIENTIDDEV }}
      REACT_APP_HOST: ${{ secrets.REACT_APP_HOST }}
      REACT_APP_ADMIN_GROUP: ${{ secrets.REACT_APP_ADMIN_GROUP }}
      REACT_APP_REDIRECT_URI: ${{ secrets.REACT_APP_REDIRECT_URI_DEV }}
      

    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2
      

      # 2. Install backend dependencies
      - name: Install backend dependencies
        run: npm ci --only=production
        working-directory: ./backend
        shell: cmd

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend
        shell: cmd

      # 4. Build frontend for production
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        shell: cmd

      # 5. Stop any previous instance (ignore if not running)
      - name: Stop old process (Admin)
        run: |
          # Run PM2 commands with elevated privileges
          Start-Process -FilePath "powershell" -ArgumentList @(
            "-Command", 
            "try { npx pm2 kill; Start-Sleep -Seconds 2 } catch { Write-Host 'No PM2 processes to stop' }"
          ) -Verb RunAs -Wait -WindowStyle Hidden
          
          # Clean up PM2 files with admin rights
          Start-Process -FilePath "powershell" -ArgumentList @(
            "-Command",
            "Remove-Item -Path '$env:USERPROFILE\.pm2' -Recurse -Force -ErrorAction SilentlyContinue"
          ) -Verb RunAs -Wait -WindowStyle Hidden
        shell: powershell
        continue-on-error: true

      # 6. Start with PM2
      - name: Launch with PM2 (Admin)
        run: |
          # Create a script to run PM2 with admin privileges
          $scriptContent = @"
          `$env:PM2_FORCE_WIN32='1'
          `$env:PIDUSAGE_USE_PS='1'
          `$env:NODE_ENV='production'
          
          Set-Location '$PWD'
          
          try {
            npx pm2 start ecosystem.config.cjs --update-env
            npx pm2 save
            Write-Host 'PM2 started successfully'
          } catch {
            Write-Host 'PM2 start failed: ' + `$_.Exception.Message
            exit 1
          }
          "@
          
          # Save script to temp file
          $scriptPath = "$env:TEMP\pm2_start.ps1"
          $scriptContent | Out-File -FilePath $scriptPath -Encoding UTF8
          
          # Run script with admin privileges
          Start-Process -FilePath "powershell" -ArgumentList @(
            "-ExecutionPolicy", "Bypass",
            "-File", $scriptPath
          ) -Verb RunAs -Wait -WindowStyle Hidden
          
          # Clean up temp script
          Remove-Item -Path $scriptPath -Force -ErrorAction SilentlyContinue
        shell: powershell


      # 7. Verify deployment
      - name: Check PM2 status
        run: |
          npx pm2 status
          npx pm2 logs --lines 10 --nostream
        shell: powershell


