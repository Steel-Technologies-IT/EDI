name: Deploy Production
on:
  push:
    branches:
      - 'Production' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: "Invex Apps Prod"
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER_PROD }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD_PROD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST_PROD }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT_PROD }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME_PROD }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port_PROD }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH_PROD }}
      REACT_APP_Entra_Authority: ${{ secrets.REACT_APP_ENTRA_AUTHORITY }}
      REACT_APP_Entra_ClientId: ${{ secrets.REACT_APP_ENTRA_CLIENTID }}
      REACT_APP_HOST: ${{ secrets.REACT_APP_HOST_PROD }}
      REACT_APP_ADMIN_GROUP: ${{ secrets.REACT_APP_ADMIN_GROUP }}
      REACT_APP_REDIRECT_URI: ${{ secrets.REACT_APP_REDIRECT_URI_PROD }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB }}
      REACT_APP_AS400_URL: ${{ secrets.REACT_APP_AS400_URL }}
      REACT_APP_AS400_USER: ${{ secrets.REACT_APP_AS400_USER }}
      REACT_APP_AS400_PASSWORD: ${{ secrets.REACT_APP_AS400_PASSWORD }}
      REACT_APP_AS400_SERVER: ${{ secrets.REACT_APP_AS400_SERVER }}
      REACT_APP_AS400_LIBRARY: ${{ secrets.REACT_APP_AS400_LIBRARY }}
      REACT_APP_NODE_ENV: ${{ secrets.REACT_APP_NODE_ENV }}
      VOUCHER_SERVICE_URL: ${{ secrets.VOUCHER_SERVICE_URL_PROD }}
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2

      # - name: Install pm2
      #   run: npm install pm2 -g
      #   shell: cmd


      # 2. Install backend dependencies
      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend
        shell: cmd

      # 3. Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
        shell: cmd

      # 4. Build frontend for production
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        shell: cmd

      # 5. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          try {
            # Force kill any existing PM2 processes and clean up
            npx pm2 stop "Invex Apps Backend"
            npx pm2 delete "Invex Apps Backend"
          } catch {
            Write-Host "No PM2 processes to stop"
          }
          # Clean up any leftover PM2 files
          try {
            Remove-Item -Path "$env:USERPROFILE\.pm2\rpc.sock" -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$env:USERPROFILE\.pm2\pub.sock" -Force -ErrorAction SilentlyContinue
          } catch {
            Write-Host "PM2 socket cleanup completed"
          }
        shell: powershell
        continue-on-error: true

      # 6. Start with PM2
      - name: Launch with PM2
        run: |
          # Clear environment variables that might interfere with PM2
          $env:RUNNER_TRACKING_ID=""
          $env:PM2_FORCE_WIN32="1"
          $env:PIDUSAGE_USE_PS="1"
          
          # Wait a moment to ensure cleanup is complete
          Start-Sleep -Seconds 2
          
          # Start PM2 applications
          npx pm2 start ecosystem.config.cjs --update-env
          
          # Save PM2 configuration
          npx pm2 save
        shell: powershell


      # 7. Verify deployment
      - name: Check PM2 status
        run: |
          npx pm2 status
          npx pm2 logs --lines 10 --nostream
        shell: powershell

