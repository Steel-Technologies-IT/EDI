name: Deploy QA
on:
  push:
    branches:
      - 'QA' 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Invex Apps QA]
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2
      
      # 2.  Install prod deps (only the first time will take >1-2 s)
      - name: Install dependencies
        run: npm install -g pm2 pg chokidar cors express multer nodemon xlsx
        shell: cmd

      # 3. Install PM2
      - name: Install dependencies
        run: npm ci --omit=dev
        shell: cmd

      # 4. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          pm2 kill
        shell: cmd

      # 5.  Start (or restart) with fresh secrets

      - name: Launch with PM2
        #env:CLIENT_ID:     ${{ secrets.CLIENT_ID }} # Must all be updated and added in github.
        run: |
          $env:RUNNER_TRACKING_ID=""
          pm2 start ecosystem.config.cjs --update-env
          npx pm2 save
        shell: powershell
      

      # 6. Reload
      - name: Reload PM2
        run: npx pm2 reload all --update-env
        shell: cmd
