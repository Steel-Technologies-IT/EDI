name: Deploy QA
on:
  push:
    branches:
      - 'QA' 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, InvexAppsQA]
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2
      
      # 2. Install PM2 globally
      - name: Install PM2
        run: npm install -g pm2
        shell: cmd

      # 3. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          npx pm2 kill || echo "No PM2 processes to stop"
        shell: cmd
        continue-on-error: true

      # 5. Start with PM2
      - name: Launch with PM2
        #env:CLIENT_ID:     ${{ secrets.CLIENT_ID }} # Must all be updated and added in github.
        run: |
          npx pm2 start ecosystem.config.cjs --update-env
          npx pm2 save
        shell: cmd

      # 5. Verify deployment
      - name: Check PM2 status
        run: npx pm2 status
        shell: cmd
