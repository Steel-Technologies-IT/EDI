name: Deploy QA
on:
  push:
    branches:
      - 'QA' 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, InvexAppsQA]
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2
      
      # 2. Install PM2 globally
      - name: Install PM2
        run: npm install -g pm2
        shell: cmd

      # 3. Install backend dependencies
      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: ./backend
        shell: cmd
        
      # 4. Install frontend dependencies  
      - name: Install frontend dependencies
        run: npm ci --omit=dev
        working-directory: ./frontend
        shell: cmd

      # 5. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          pm2 kill || echo "No PM2 processes to stop"
        shell: cmd
        continue-on-error: true

      # 6. Start with PM2
      - name: Launch with PM2
        #env:CLIENT_ID:     ${{ secrets.CLIENT_ID }} # Must all be updated and added in github.
        run: |
          $env:RUNNER_TRACKING_ID=""
          pm2 start ecosystem.config.cjs --update-env
          npx pm2 save
        shell: powershell
      

      # 6. Reload
      - name: Reload PM2
        run: npx pm2 reload all --update-env
        shell: cmd
