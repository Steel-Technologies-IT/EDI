name: Deploy QA
on:
  push:
    branches:
      - 'QA' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: InvexAppsQA
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_QA }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID_QA }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET_QA }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB_QA }}
      REACT_APP_AS400_URL: ${{ secrets.REACT_APP_AS400_URL_QA }}
      REACT_APP_AS400_USER: ${{ secrets.REACT_APP_AS400_USER_QA }}
      REACT_APP_AS400_PASSWORD: ${{ secrets.REACT_APP_AS400_PASSWORD_QA }}
      REACT_APP_AS400_SERVER: ${{ secrets.REACT_APP_AS400_SERVER_QA }}
      REACT_APP_AS400_LIBRARY: ${{ secrets.REACT_APP_AS400_LIBRARY_QA }}
      REACT_APP_NODE_ENV: ${{ secrets.REACT_APP_NODE_ENV_QA }}
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2

      # - name: Install pm2
      #   run: npm install pm2 -g
      #   shell: cmd

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          Write-Host "Installing backend dependencies..."
          cd backend
          npm ci --omit=dev
        shell: powershell
        
      # 3. Install or restart the service
      - name: Install or restart service
        run: |
          # Set all environment variables
          $env:REACT_APP_DB_USER = "${{ secrets.REACT_APP_DB_USER }}"
          $env:REACT_APP_DB_PASSWORD = "${{ secrets.REACT_APP_DB_PASSWORD }}"
          $env:REACT_APP_DB_HOST = "${{ secrets.REACT_APP_DB_HOST }}"
          $env:REACT_APP_DB_PORT = "${{ secrets.REACT_APP_DB_PORT }}"
          $env:REACT_APP_DB_NAME = "${{ secrets.REACT_APP_DB_NAME }}"
          $env:REACT_APP_Server_Port = "${{ secrets.REACT_APP_Server_Port }}"
          $env:REACT_APP_CLEO_PATH = "${{ secrets.REACT_APP_CLEO_PATH }}"
          $env:REACT_APP_API_URL = "${{ secrets.REACT_APP_API_URL_QA }}"
          $env:REACT_APP_CLIENT_ID = "${{ secrets.REACT_APP_CLIENT_ID_QA }}"
          $env:REACT_APP_CLIENT_SECRET = "${{ secrets.REACT_APP_CLIENT_SECRET_QA }}"
          $env:REACT_APP_INVEX_DB = "${{ secrets.REACT_APP_INVEX_DB_QA }}"
          $env:REACT_APP_AS400_URL = "${{ secrets.REACT_APP_AS400_URL_QA }}"
          $env:REACT_APP_AS400_USER = "${{ secrets.REACT_APP_AS400_USER_QA }}"
          $env:REACT_APP_AS400_PASSWORD = "${{ secrets.REACT_APP_AS400_PASSWORD_QA }}"
          $env:REACT_APP_AS400_SERVER = "${{ secrets.REACT_APP_AS400_SERVER_QA }}"
          $env:REACT_APP_AS400_LIBRARY = "${{ secrets.REACT_APP_AS400_LIBRARY_QA }}"
          $env:REACT_APP_NODE_ENV = "${{ secrets.REACT_APP_NODE_ENV_QA }}"
          
          $serviceName = "InvexAppsBackend"
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          
          if ($service) {
            Write-Host "Service exists. Restarting..."
            
            # Stop the service
            if ($service.Status -eq 'Running') {
              Write-Host "Stopping service..."
              Stop-Service $serviceName -Force
              
              # Wait for service to stop
              $timeout = 30
              $count = 0
              while ((Get-Service $serviceName).Status -ne 'Stopped' -and $count -lt $timeout) {
                Start-Sleep -Seconds 1
                $count++
              }
              Write-Host "Service stopped"
            }
            
            # Start the service
            Write-Host "Starting service..."
            Start-Service $serviceName
            
            # Wait for service to start
            $timeout = 30
            $count = 0
            while ((Get-Service $serviceName).Status -ne 'Running' -and $count -lt $timeout) {
              Start-Sleep -Seconds 1
              $count++
            }
          } else {
            Write-Host "Service does not exist. Installing..."
            
            # Install the service (with timeout)
            $installJob = Start-Job -ScriptBlock {
              param($workingDir, $envVars)
              Set-Location $workingDir
              
              # Set environment variables in the job
              foreach ($env in $envVars.GetEnumerator()) {
                Set-Item -Path "env:$($env.Key)" -Value $env.Value
              }
              
              node install-service.js 2>&1
            } -ArgumentList $PWD, $env:
            
            # Wait up to 60 seconds for installation
            $completed = Wait-Job $installJob -Timeout 60
            
            if ($completed) {
              $output = Receive-Job $installJob
              Write-Host $output
              Remove-Job $installJob
            } else {
              Write-Host "Service installation timed out after 60 seconds!"
              Stop-Job $installJob
              Remove-Job $installJob
              
              # Check if service was created anyway
              Start-Sleep -Seconds 5
              $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
              if (-not $service) {
                Write-Host "ERROR: Service installation failed"
                exit 1
              } else {
                Write-Host "Service was created despite timeout"
              }
            }
            
            Write-Host "Waiting for service to start..."
            Start-Sleep -Seconds 5
          }
          
          # Check final status
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if ($service) {
            $finalStatus = $service.Status
            Write-Host ""
            Write-Host "=== Service Status ==="
            Get-Service $serviceName | Format-Table -AutoSize
            
            if ($finalStatus -eq 'Running') {
              Write-Host ""
              Write-Host "Successfully deployed - Windows service is running"
            } else {
              Write-Host ""
              Write-Host "ERROR: Service failed to start!"
              Write-Host "Status: $finalStatus"
              exit 1
            }
          } else {
            Write-Host "ERROR: Service was not created!"
            exit 1
          }
          
          Write-Host ""
          Write-Host "Deployment complete!"
        shell: powershell