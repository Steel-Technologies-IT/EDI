name: Deploy QA
on:
  push:
    branches:
      - 'QA' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: InvexAppsQA
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_QA }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID_QA }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET_QA }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB_QA }}
      REACT_APP_AS400_URL: ${{ secrets.REACT_APP_AS400_URL_QA }}
      REACT_APP_AS400_USER: ${{ secrets.REACT_APP_AS400_USER_QA }}
      REACT_APP_AS400_PASSWORD: ${{ secrets.REACT_APP_AS400_PASSWORD_QA }}
      REACT_APP_AS400_SERVER: ${{ secrets.REACT_APP_AS400_SERVER_QA }}
      REACT_APP_AS400_LIBRARY: ${{ secrets.REACT_APP_AS400_LIBRARY_QA }}
      REACT_APP_NODE_ENV: ${{ secrets.REACT_APP_NODE_ENV_QA }}
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2

      # - name: Install pm2
      #   run: npm install pm2 -g
      #   shell: cmd

      - name: Setup PM2 Service
        run: |
          # Check if PM2 service exists
          $serviceExists = Get-Service -Name "PM2" -ErrorAction SilentlyContinue
          
          if (-not $serviceExists) {
            Write-Host "Installing PM2 as Windows Service..."
            
            # Install PM2 and pm2-windows-startup
            npm install -g pm2@latest
            npm install -g pm2-windows-startup
            
            # Set PM2_HOME before installing service
            [System.Environment]::SetEnvironmentVariable('PM2_HOME', 'C:\ProgramData\pm2', 'Machine')
            $env:PM2_HOME = 'C:\ProgramData\pm2'
            
            # Install PM2 as a Windows service
            pm2-windows-startup install
            
            # Start the PM2 service
            Start-Service PM2
            
            Write-Host "PM2 service installed and started"
          } else {
            Write-Host "PM2 service already exists"
            # Ensure PM2 is installed globally
            npm install -g pm2@latest
            
            # Set PM2_HOME
            $env:PM2_HOME = 'C:\ProgramData\pm2'
            
            # Ensure it's running
            if ((Get-Service PM2).Status -ne 'Running') {
              Write-Host "Starting PM2 service..."
              Start-Service PM2
            } else {
              Write-Host "PM2 service is already running"
            }
          }
        shell: powershell
        continue-on-error: true 


      - name: Setup PM2 directory
        run: |
          # Set PM2_HOME environment variable for this session
          $env:PM2_HOME = 'C:\ProgramData\pm2'
          
          # Create PM2 directory
          New-Item -ItemType Directory -Force -Path "C:\ProgramData\pm2\logs" | Out-Null
          
          # Grant full control to Everyone (required for service account)
          $acl = Get-Acl "C:\ProgramData\pm2"
          $rule = New-Object System.Security.AccessControl.FileSystemAccessRule("Everyone","FullControl","ContainerInherit,ObjectInherit","None","Allow")
          $acl.SetAccessRule($rule)
          Set-Acl "C:\ProgramData\pm2" $acl
          
          Write-Host "PM2 directory configured at: $env:PM2_HOME"
        shell: powershell

        
      # 2. Install backend dependencies
      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: ./backend
        shell: cmd

      # 3. Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
        shell: cmd

      # 4. Build frontend for production
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        shell: cmd

      # 5. Stop any previous instance (ignore if not running)
      - name: Stop old process
        run: |
          $env:PM2_HOME = 'C:\ProgramData\pm2'
          
          try {
            # Stop existing PM2 processes
            pm2 stop all
            pm2 delete all
            Write-Host "Stopped all PM2 processes"
          } catch {
            Write-Host "No PM2 processes to stop"
          }
          
        shell: powershell
        continue-on-error: true

      # 6. Start with PM2 and ensure it persists
      - name: Launch with PM2
        run: |
          $env:PM2_HOME = 'C:\ProgramData\pm2'
          
          Write-Host "Starting applications with PM2..."
          
          # Ensure PM2 daemon is running (will connect to service)
          pm2 ping
          
          # Delete all existing processes (clean slate)
          pm2 delete all
          
          # Start PM2 applications
          pm2 start ecosystem.config.cjs --update-env
          
          # Save PM2 configuration so it persists through service restarts
          pm2 save --force
          
          # Show PM2 status
          Write-Host "`nPM2 Process List:"
          pm2 list
          
          # Verify processes are running
          $processes = pm2 jlist | ConvertFrom-Json
          if ($processes.Count -gt 0) {
            Write-Host "`n✓ PM2 processes started successfully:"
            foreach ($proc in $processes) {
              Write-Host "  - $($proc.name): $($proc.pm2_env.status) (PID: $($proc.pid))"
            }
          } else {
            Write-Host "`n✗ Warning: No PM2 processes found!"
          }
          
          Write-Host "`nPM2 Service Status:"
          Get-Service PM2 | Format-Table -AutoSize
          
          Write-Host "Deployment complete!"
        shell: powershell