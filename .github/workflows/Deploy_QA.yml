name: Deploy QA
on:
  push:
    branches:
      - 'QA' 
  workflow_dispatch:


jobs:
  deploy:
    runs-on: InvexAppsQA
    env:
      REACT_APP_DB_USER: ${{ secrets.REACT_APP_DB_USER }}
      REACT_APP_DB_PASSWORD: ${{ secrets.REACT_APP_DB_PASSWORD }}
      REACT_APP_DB_HOST: ${{ secrets.REACT_APP_DB_HOST }}
      REACT_APP_DB_PORT: ${{ secrets.REACT_APP_DB_PORT }}
      REACT_APP_DB_NAME: ${{ secrets.REACT_APP_DB_NAME }}
      REACT_APP_Server_Port: ${{ secrets.REACT_APP_Server_Port }}
      REACT_APP_CLEO_PATH: ${{ secrets.REACT_APP_CLEO_PATH }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_QA }}
      REACT_APP_CLIENT_ID: ${{ secrets.REACT_APP_CLIENT_ID_QA }}
      REACT_APP_CLIENT_SECRET: ${{ secrets.REACT_APP_CLIENT_SECRET_QA }}
      REACT_APP_INVEX_DB: ${{ secrets.REACT_APP_INVEX_DB_QA }}
      REACT_APP_AS400_URL: ${{ secrets.REACT_APP_AS400_URL_QA }}
      REACT_APP_AS400_USER: ${{ secrets.REACT_APP_AS400_USER_QA }}
      REACT_APP_AS400_PASSWORD: ${{ secrets.REACT_APP_AS400_PASSWORD_QA }}
      REACT_APP_AS400_SERVER: ${{ secrets.REACT_APP_AS400_SERVER_QA }}
      REACT_APP_AS400_LIBRARY: ${{ secrets.REACT_APP_AS400_LIBRARY_QA }}
      REACT_APP_NODE_ENV: ${{ secrets.REACT_APP_NODE_ENV_QA }}
    steps:
      # 1.  Get the code
      - uses: actions/checkout@v4.2.2

      # - name: Install pm2
      #   run: npm install pm2 -g
      #   shell: cmd

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          Write-Host "Installing backend dependencies..."
          cd backend
          npm ci --omit=dev
        shell: powershell
        
      # 3. Restart the service
      - name: Restart service
        run: |
          $serviceName = "InvexAppsBackend"
          
          Write-Host "Attempting to restart service: $serviceName"
          
          try {
            # Try to stop the service
            Write-Host "Stopping service..."
            Stop-Service $serviceName -Force -ErrorAction Stop
            
            # Wait for service to stop
            $timeout = 30
            $count = 0
            $stopped = $false
            while ($count -lt $timeout) {
              try {
                $status = (Get-Service $serviceName -ErrorAction Stop).Status
                if ($status -eq 'Stopped') {
                  $stopped = $true
                  break
                }
              } catch {
                # Service might not be queryable, assume stopped
                $stopped = $true
                break
              }
              Start-Sleep -Seconds 1
              $count++
            }
            
            if ($stopped) {
              Write-Host "Service stopped successfully"
            } else {
              Write-Host "Warning: Could not confirm service stopped, proceeding anyway"
            }
          } catch {
            Write-Host "Note: Could not stop service (may not be running): $_"
          }
          
          # Always try to start the service
          Write-Host "Starting service..."
          try {
            Start-Service $serviceName -ErrorAction Stop
            Write-Host "Service start command executed successfully"
            
            # Wait a moment for service to start
            Start-Sleep -Seconds 5
            
            # Try to verify it's running
            try {
              $service = Get-Service $serviceName -ErrorAction Stop
              Write-Host ""
              Write-Host "=== Service Status ==="
              $service | Format-Table -AutoSize
              
              if ($service.Status -eq 'Running') {
                Write-Host ""
                Write-Host "Successfully deployed - Windows service is running"
              } else {
                Write-Host ""
                Write-Host "Warning: Service status is $($service.Status)"
              }
            } catch {
              Write-Host ""
              Write-Host "Service started but status cannot be queried (this is OK if permissions are limited)"
              Write-Host "Assuming deployment was successful"
            }
          } catch {
            Write-Host ""
            Write-Host "ERROR: Failed to start service!"
            Write-Host "Error: $_"
            Write-Host ""
            Write-Host "Please check:"
            Write-Host "1. Is the service installed? Run: Get-Service InvexAppsBackend"
            Write-Host "2. Check Windows Event Log for service errors"
            Write-Host "3. Verify GitHub Actions runner has permissions to manage services"
            exit 1
          }
          
          Write-Host ""
          Write-Host "Deployment complete!"
        shell: powershell