name: Print Secrets

on:
  workflow_dispatch:

jobs:
  print-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Print Secret Values
        run: |
          echo "VOUCHER_SERVICE_URL (base64):"
          echo "${{ secrets.VOUCHER_SERVICE_URL }}" 
          echo ""
          
          echo "REACT_APP_API_URL (base64):"
          echo "${{ secrets.REACT_APP_API_URL }}" 
          echo ""
          
          echo "REACT_APP_CLIENT_ID (base64):"
          echo "${{ secrets.REACT_APP_CLIENT_ID }}"
          echo ""
          
          echo "REACT_APP_CLIENT_SECRET (base64):"
          echo "${{ secrets.REACT_APP_CLIENT_SECRET }}"
          echo ""
          
          echo "REACT_APP_AS400_URL (base64):"
          echo "${{ secrets.REACT_APP_AS400_URL }}" 
          echo ""
          
          echo "REACT_APP_AS400_USER (base64):"
          echo "${{ secrets.REACT_APP_AS400_USER }}" 
          echo ""
          
          echo "REACT_APP_AS400_PASSWORD (base64):"
          echo "${{ secrets.REACT_APP_AS400_PASSWORD }}" 
          echo ""
          
          echo "REACT_APP_AS400_SERVER (base64):"
          echo "${{ secrets.REACT_APP_AS400_SERVER }}" 
          echo ""
          
          echo "REACT_APP_AS400_LIBRARY (base64):"
          echo "${{ secrets.REACT_APP_AS400_LIBRARY }}"
