name: Trigger auto deployment for edi-backend-qa

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ QA ]
    paths:
    - '**'
    - '.github/workflows/edi-backend-qa-AutoDeployTrigger-d75e1b1c-24fa-43c6-9bb3-647b3ebdc468.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.EDIBACKENDQA_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: azstqa-fmafedcthvhbh3d6.azurecr.io
          registryUsername: ${{ secrets.EDIBACKENDQA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EDIBACKENDQA_REGISTRY_PASSWORD }}
          containerAppName: edi-backend-qa
          resourceGroup: AZ-CLD-EDI-RG
          imageToBuild: azstqa-fmafedcthvhbh3d6.azurecr.io/edi-backend-qa:${{ github.sha }}
          
            

     

