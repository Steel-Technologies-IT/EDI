name: Trigger auto deployment for edi-frontend-qa

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ QA ]
    paths:
    - '**'
    - '.github/workflows/edi-frontend-qa-AutoDeployTrigger-d04e2c68-3910-4eb4-aef3-b96a0df3e3cc.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.EDIFRONTENDQA_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: azstqa-fmafedcthvhbh3d6.azurecr.io
          registryUsername: ${{ secrets.EDIFRONTENDQA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EDIFRONTENDQA_REGISTRY_PASSWORD }}
          containerAppName: edi-frontend-qa
          resourceGroup: AZ-CLD-EDI-RG
          imageToBuild: azstqa-fmafedcthvhbh3d6.azurecr.io/edi-frontend-qa:${{ github.sha }}
          
            

     

